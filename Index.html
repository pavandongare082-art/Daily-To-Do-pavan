<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Task Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f5f4ef;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e0ddd5;
    --text: #1a1a18;
    --text2: #6b6b60;
    --text3: #9b9b8e;
    --accent: #e8813a;
    --accent2: #d4691e;
    --green-bg: #d4edda;
    --green-text: #1a5c2a;
    --green-border: #a8d5b5;
    --orange-header: #f4a84a;
    --row-green: #c6e6c6;
    --done-green: #4a8c5c;
    --tag-pending: #fff3e0;
    --tag-pending-text: #b45309;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }
  .topbar-logo span {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px;
  }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
    border: none;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-export {
    background: #2d6a4f;
    color: white;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-export:hover { background: #235a41; transform: translateY(-1px); }

  /* ─── LAYOUT ─── */
  .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* ─── MONTH HEADER ─── */
  .month-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .month-selector h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--text);
  }
  .month-nav {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .month-nav button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 12px;
    font-size: 14px;
    color: var(--text2);
    transition: background .1s;
  }
  .month-nav button:hover { background: var(--surface2); }
  .month-nav span {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    display: flex; align-items: center;
    min-width: 130px; justify-content: center;
  }

  /* ─── STATS ROW ─── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .9rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stat-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .stat-icon.total { background: #fef3e2; }
  .stat-icon.done { background: #d4edda; }
  .stat-icon.pending { background: #fff3e0; }
  .stat-num { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }

  /* ─── ADD TASK PANEL ─── */
  .add-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.4rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
  }
  .add-panel-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 1rem;
  }
  .add-row {
    display: grid;
    grid-template-columns: 140px 1fr 120px;
    gap: 10px;
    align-items: end;
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    width: 100%;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,129,58,.12);
    background: var(--surface);
  }
  .field textarea {
    resize: none;
    height: 80px;
    line-height: 1.6;
  }
  .add-row-2 {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 1fr 120px;
    gap: 10px;
    align-items: end;
  }

  /* ─── TASKS TABLE ─── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: .75rem;
  }
  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .sheet-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  /* Excel-style header */
  .sheet-title-row {
    background: var(--orange-header);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #5c2e00;
    padding: 8px;
    letter-spacing: .1em;
    text-transform: uppercase;
    border-bottom: 1px solid #d48830;
  }
  .sheet-col-header {
    display: grid;
    grid-template-columns: 100px 80px 1fr 100px;
    background: #5a8c50;
    color: white;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .04em;
    border-bottom: 1px solid #4a7a42;
  }
  .sheet-col-header div {
    padding: 8px 12px;
    border-right: 1px solid rgba(255,255,255,.15);
  }
  .sheet-col-header div:last-child { border-right: none; }

  .task-row {
    display: grid;
    grid-template-columns: 100px 80px 1fr 100px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: none; } }

  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: #f9f9f6; }
  .task-row.done-row { background: var(--row-green); }
  .task-row.done-row:hover { background: #b8ddb8; }

  .task-cell {
    padding: 12px 12px;
    font-size: 13px;
    color: var(--text);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
  }
  .task-cell:last-child { border-right: none; }

  .cell-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    padding-top: 13px;
  }
  .cell-day {
    font-size: 12px;
    color: var(--text2);
    padding-top: 13px;
  }
  .cell-tasks {
    flex-direction: column;
    gap: 4px;
    line-height: 1.6;
    align-items: stretch;
  }
  .task-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    padding: 3px 0;
  }
  .task-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    min-width: 18px;
    padding-top: 2px;
  }
  .task-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
    flex: 1;
  }
  .task-row.done-row .task-text { color: var(--done-green); }

  .cell-status {
    flex-direction: column;
    gap: 6px;
    align-items: center;
    justify-content: flex-start;
    padding-top: 13px;
  }
  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .03em;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    width: 76px;
    user-select: none;
  }
  .status-pending {
    background: var(--tag-pending);
    color: var(--tag-pending-text);
    border: 1px solid #fcd34d;
  }
  .status-pending:hover { background: #fde68a; }
  .status-done {
    background: var(--green-bg);
    color: var(--green-text);
    border: 1px solid var(--green-border);
  }
  .status-done:hover { background: #b7d9c4; }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 5px;
    margin-top: 4px;
    transition: all .12s;
  }
  .delete-btn:hover { color: #dc2626; background: #fee2e2; }

  /* Empty state */
  .empty-state {
    padding: 3rem 1rem;
    text-align: center;
    color: var(--text3);
    font-size: 14px;
  }
  .empty-state .e-icon { font-size: 36px; margin-bottom: .75rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: #1a1a18;
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all .25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: none; }

  @media(max-width: 640px) {
    .add-row { grid-template-columns: 1fr; }
    .add-row-2 { grid-template-columns: 1fr; }
    .sheet-col-header, .task-row { grid-template-columns: 80px 60px 1fr 80px; }
    .stats { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <span>✓</span>
    Daily Task Tracker
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
    <button class="btn btn-export" onclick="exportToExcel()">
      ⬇ Export to Excel
    </button>
  </div>
</div>

<div class="container">

  <!-- Month Nav -->
  <div class="month-selector">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="month-label">JULY 2025</span>
      <button onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon total">📋</div>
      <div>
        <div class="stat-num" id="s-total">0</div>
        <div class="stat-lbl">Total Days</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon done">✅</div>
      <div>
        <div class="stat-num" id="s-done">0</div>
        <div class="stat-lbl">Done</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon pending">⏳</div>
      <div>
        <div class="stat-num" id="s-pending">0</div>
        <div class="stat-lbl">Pending</div>
      </div>
    </div>
  </div>

  <!-- Add Task -->
  <div class="add-panel">
    <div class="add-panel-title">Add Tasks for a Date</div>
    <div class="add-row">
      <div class="field">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>Tasks (one per line)</label>
        <textarea id="f-tasks" placeholder="1. Checked pre-scheduled streams&#10;2. Edited Day 10 video&#10;3. Shared link with Sumaiya"></textarea>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn-primary" style="width:100%;padding:10px" onclick="addEntry()">+ Add</button>
      </div>
    </div>
  </div>

  <!-- Sheet -->
  <div class="section-header">
    <div class="section-title">Task Sheet — <span id="sheet-month-label">July 2025</span></div>
  </div>

  <div class="sheet-wrap">
    <div class="sheet-title-row" id="sheet-title">JULY</div>
    <div class="sheet-col-header">
      <div>Date</div>
      <div>Day</div>
      <div>Task Description</div>
      <div>Status</div>
    </div>
    <div id="task-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

// Storage key per month
function storageKey() { return `tasks_${currentYear}_${currentMonth}`; }

function loadEntries() {
  try { return JSON.parse(localStorage.getItem(storageKey()) || '[]'); } catch { return []; }
}
function saveEntries(entries) {
  localStorage.setItem(storageKey(), JSON.stringify(entries));
}

function setMonth() {
  document.getElementById('month-label').textContent = `${MONTHS[currentMonth].toUpperCase()} ${currentYear}`;
  document.getElementById('sheet-month-label').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  document.getElementById('sheet-title').textContent = MONTHS[currentMonth].toUpperCase();
  // Set date input to current month
  const today = new Date();
  const y = currentYear, m = String(currentMonth+1).padStart(2,'0');
  const d = (today.getMonth()===currentMonth && today.getFullYear()===currentYear)
    ? String(today.getDate()).padStart(2,'0')
    : '01';
  document.getElementById('f-date').value = `${y}-${m}-${d}`;
  document.getElementById('f-date').min = `${y}-${m}-01`;
  const lastDay = new Date(y, currentMonth+1, 0).getDate();
  document.getElementById('f-date').max = `${y}-${m}-${String(lastDay).padStart(2,'0')}`;
  render();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  setMonth();
}

function addEntry() {
  const dateVal = document.getElementById('f-date').value;
  const tasksRaw = document.getElementById('f-tasks').value.trim();
  if (!dateVal || !tasksRaw) { showToast('Please fill in date and tasks'); return; }

  const entries = loadEntries();
  const existing = entries.find(e => e.date === dateVal);
  // Parse tasks — split by newline, clean numbers
  const newTasks = tasksRaw.split('\n').map(t => t.replace(/^\d+[\.\)]\s*/, '').trim()).filter(Boolean);

  if (existing) {
    existing.tasks.push(...newTasks);
  } else {
    entries.push({ date: dateVal, tasks: newTasks, status: 'PENDING' });
  }
  // Sort by date
  entries.sort((a,b) => a.date.localeCompare(b.date));
  saveEntries(entries);
  document.getElementById('f-tasks').value = '';
  render();
  showToast('Tasks added!');
}

function toggleStatus(date) {
  const entries = loadEntries();
  const e = entries.find(x => x.date === date);
  if (e) {
    e.status = e.status === 'DONE' ? 'PENDING' : 'DONE';
    saveEntries(entries);
    render();
    showToast(e.status === 'DONE' ? '✅ Marked as Done!' : 'Marked as Pending');
  }
}

function deleteEntry(date) {
  if (!confirm('Delete all tasks for this date?')) return;
  let entries = loadEntries();
  entries = entries.filter(e => e.date !== date);
  saveEntries(entries);
  render();
  showToast('Deleted');
}

function deleteTask(date, idx) {
  const entries = loadEntries();
  const e = entries.find(x => x.date === date);
  if (e) {
    e.tasks.splice(idx, 1);
    if (e.tasks.length === 0) {
      const i = entries.indexOf(e);
      entries.splice(i, 1);
    }
    saveEntries(entries);
    render();
  }
}

function formatDateDisplay(dateStr) {
  const [y,m,d] = dateStr.split('-');
  return `${d}/${m}/${String(y).slice(2)}`;
}

function getDayName(dateStr) {
  const d = new Date(dateStr);
  return DAYS[d.getDay()];
}

function render() {
  const entries = loadEntries();
  const list = document.getElementById('task-list');
  const total = entries.length;
  const done = entries.filter(e => e.status === 'DONE').length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pending').textContent = total - done;

  if (!entries.length) {
    list.innerHTML = `<div class="empty-state"><div class="e-icon">📋</div>No tasks yet for ${MONTHS[currentMonth]}.<br>Add your first entry above!</div>`;
    return;
  }

  list.innerHTML = entries.map(e => `
    <div class="task-row ${e.status==='DONE' ? 'done-row' : ''}">
      <div class="task-cell cell-date">${formatDateDisplay(e.date)}</div>
      <div class="task-cell cell-day">${getDayName(e.date)}</div>
      <div class="task-cell cell-tasks">
        ${e.tasks.map((t,i) => `
          <div class="task-item">
            <span class="task-num">${i+1}.</span>
            <span class="task-text">${escHtml(t)}</span>
            <button class="delete-btn" onclick="deleteTask('${e.date}',${i})" title="Remove task">✕</button>
          </div>
        `).join('')}
      </div>
      <div class="task-cell cell-status">
        <span class="status-badge ${e.status==='DONE' ? 'status-done' : 'status-pending'}"
              onclick="toggleStatus('${e.date}')"
              title="Click to toggle">
          ${e.status}
        </span>
        <button class="delete-btn" onclick="deleteEntry('${e.date}')" title="Delete this date">🗑</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearAll() {
  if (!confirm(`Clear all tasks for ${MONTHS[currentMonth]} ${currentYear}?`)) return;
  localStorage.removeItem(storageKey());
  render();
  showToast('All tasks cleared');
}

// ─── EXPORT TO EXCEL ─────────────────────────────────────────────────────────
function exportToExcel() {
  const entries = loadEntries();
  if (!entries.length) { showToast('No tasks to export'); return; }

  const wb = XLSX.utils.book_new();
  const ws_data = [];

  // Row 1: Month title (merged look via colspan not possible in XLSX data, use value)
  ws_data.push([MONTHS[currentMonth].toUpperCase(), '', '', '']);

  // Row 2: Column headers
  ws_data.push(['Date', 'Day', 'Task Description', 'Status']);

  // Data rows
  entries.forEach(e => {
    const tasksText = e.tasks.map((t,i) => `${i+1}.${t}`).join('\n');
    ws_data.push([formatDateDisplay(e.date), getDayName(e.date), tasksText, e.status]);
  });

  const ws = XLSX.utils.aoa_to_sheet(ws_data);

  // Column widths
  ws['!cols'] = [
    { wch: 12 }, { wch: 12 }, { wch: 80 }, { wch: 12 }
  ];

  // Row heights
  ws['!rows'] = [{ hpt: 24 }, { hpt: 20 }];
  entries.forEach((e,i) => {
    ws['!rows'].push({ hpt: Math.max(40, e.tasks.length * 18) });
  });

  // Wrap text for task column
  entries.forEach((_, i) => {
    const cellRef = `C${i+3}`;
    if (ws[cellRef]) {
      ws[cellRef].s = { alignment: { wrapText: true, vertical: 'top' } };
    }
  });

  // Styling via cell properties
  // Title row — orange background
  const titleCell = ws['A1'];
  if (titleCell) titleCell.s = {
    fill: { fgColor: { rgb: 'F4A84A' } },
    font: { bold: true, color: { rgb: '5C2E00' }, sz: 14 },
    alignment: { horizontal: 'center' }
  };

  // Merge title row A1:D1
  ws['!merges'] = [{ s:{r:0,c:0}, e:{r:0,c:3} }];

  // Header row — green
  ['A2','B2','C2','D2'].forEach(ref => {
    if (ws[ref]) ws[ref].s = {
      fill: { fgColor: { rgb: '5A8C50' } },
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      alignment: { horizontal: 'center', vertical: 'center' }
    };
  });

  // Data rows — green background for done, default for pending
  entries.forEach((e, i) => {
    const row = i + 3;
    const isDone = e.status === 'DONE';
    const bg = isDone ? 'C6E6C6' : 'FFFFFF';
    ['A','B','C','D'].forEach(col => {
      const ref = `${col}${row}`;
      if (!ws[ref]) ws[ref] = { v: '', t: 's' };
      ws[ref].s = {
        fill: { fgColor: { rgb: bg } },
        alignment: { vertical: 'top', wrapText: true },
        border: {
          top: { style: 'thin', color: { rgb: 'C0C0C0' } },
          bottom: { style: 'thin', color: { rgb: 'C0C0C0' } },
          left: { style: 'thin', color: { rgb: 'C0C0C0' } },
          right: { style: 'thin', color: { rgb: 'C0C0C0' } }
        }
      };
    });
  });

  XLSX.utils.book_append_sheet(wb, ws, MONTHS[currentMonth].toUpperCase());

  const filename = `TaskSheet_${MONTHS[currentMonth]}_${currentYear}.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast(`Downloaded: ${filename}`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Set to July 2025 to match user's existing data, or current month
const now = new Date();
currentMonth = now.getMonth();
currentYear = now.getFullYear();
setMonth();
</script>
